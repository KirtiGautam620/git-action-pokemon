name: Frontend
on: 
  push:
    branches: [main]
jobs:
  node-setup-job:
   runs-on: ubuntu-latest
   defaults:
     run:
       working-directory: frontend
   steps:
     - name: Checkout Repo
       uses: actions/checkout@v4
     - name: Initialize Node
       uses: actions/setup-node@v4
     - name: Install npm
       run: npm install
     - name: Run npm build
       run: npm run build
